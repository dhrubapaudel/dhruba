      <div class="contact-row reveal">

        <div>
          <span class="cl">Email</span>
          <!-- TODO: Replace with your real email -->
          <span class="cv">dhrubapaudel5@gmail.com</span>
        </div>
      </div>

      <div class="contact-row reveal">
        <span class="ci">📱</span>
        <div>
          <span class="cl">Phone</span>
          <!-- TODO: Replace with your real phone number -->
          <span class="cv">+977 9847135773</span>
        </div>
      </div>

      <div class="contact-row reveal">
        <span class="ci">📍</span>
        <div>
          <span class="cl">Location</span>
          <span class="cv">Kathmandu, Nepal</span>
        </div>
      </div>

      <div class="contact-row reveal">
        <span class="ci">🌐</span>
        <div>
          <span class="cl">Website</span>
          <span class="cv">dhrubapaudel.com.np</span>
        </div>
      </div>

      <div class="contact-row reveal">
        <span class="ci">🎓</span>
        <div>
          <span class="cl">Institution</span>
          <span class="cv">IOE Thapathali Campus, TU</span>
        </div>
      </div>

      <div class="contact-row reveal">
        <span class="ci">🔬</span>
        <div>
          <span class="cl">Research Area</span>
          <span class="cv">Seismic · Geotechnics · Structure · SSI · SSSI</span>
        </div>
      </div>

    </div>

    <!-- Contact Form -->
    <div class="contact-form">
      <div class="cf-row">
        <div class="cf-group">
          <label>Name</label>
          <input type="text" id="cf-name" placeholder="Your full name" />
        </div>
        <div class="cf-group">
          <label>Email</label>
          <input type="email" id="cf-email" placeholder="your@email.com" />
        </div>
      </div>

      <div class="cf-group">
        <label>Subject</label>
        <input type="text" id="cf-subject" placeholder="Research inquiry, collaboration, freelance..." />
      </div>

      <div class="cf-group">
        <label>Message</label>
        <textarea id="cf-message" placeholder="Write your message here..."></textarea>
      </div>

      <button class="submit-btn" onclick="handleSubmit()">Send Message →</button>
